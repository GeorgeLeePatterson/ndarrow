name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.repository }}-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  checks: write

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  RUSTFLAGS: '-C debuginfo=line-tables-only -C incremental=false'

jobs:
  # ── Detect changes ──
  changes:
    name: detect-changes
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@master
        id: filter
        with:
          predicate-quantifier: 'every'
          filters: |
            code:
              - '**'
              - '!**.md'
              - '!docs/**'
              - '!.claude/**'
              - '!.gitignore'
              - '!LICENSE'
              - '!.github/workflows/pr.yml'
              - '!.github/workflows/security.yml'
              - '!.github/dependabot.yml'
              - '!.github/labeler.yml'

  # ── Check (fmt + clippy + compile) ──
  check:
    name: check
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Install Rust nightly (for rustfmt)
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt

      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-check-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-check-

      - name: Check formatting
        run: cargo +nightly fmt --all -- --check

      - name: Clippy (no default features)
        run: cargo +stable clippy --workspace --all-targets --no-default-features -- -D warnings -W clippy::pedantic

      - name: Clippy (all features)
        run: cargo +stable clippy --workspace --all-targets --all-features -- -D warnings -W clippy::pedantic

      - name: Compile check (no default features)
        run: cargo +stable check --workspace --no-default-features

      - name: Compile check (all features)
        run: cargo +stable check --workspace --all-features

  # ── Unit tests ──
  test-unit:
    name: test-unit
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-test-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-test-

      - name: Unit tests
        run: cargo test --workspace --lib -- --nocapture --show-output

  # ── Integration tests ──
  test-integration:
    name: test-integration
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-test-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-test-

      - name: Integration tests
        run: cargo test -p ndarrow --tests -- --nocapture --show-output

  # ── Coverage ──
  coverage:
    name: coverage
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-cov-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-cov-

      - name: Generate coverage
        run: |
          cargo llvm-cov clean --workspace
          cargo llvm-cov --workspace --lib --tests --no-report
          cargo llvm-cov report --fail-under-lines 90 --lcov --output-path lcov.info

      - name: Upload coverage to Codecov
        if: github.event_name != 'pull_request'
        uses: codecov/codecov-action@v6
        with:
          files: lcov.info
          fail_ci_if_error: true
          token: ${{ secrets.CODECOV_TOKEN }}

  # ── Benchmark smoke ──
  benchmark-smoke:
    name: benchmark-smoke
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install just
        uses: taiki-e/install-action@just

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-bench-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-bench-

      - name: Restore benchmark baseline
        uses: actions/cache/restore@v5
        with:
          path: crates/ndarrow/target/criterion
          key: ${{ runner.os }}-bench-baseline-${{ github.ref_name }}
          restore-keys: |
            ${{ runner.os }}-bench-baseline-main

      - name: Run benchmark smoke tests
        run: just bench-smoke

      - name: Generate benchmark report
        run: just bench-report

      - name: Enforce benchmark regression thresholds
        env:
          BENCH_WARN_PCT: "8"
          BENCH_FAIL_PCT: "15"
          BENCH_MIN_BASELINE_NS: "100"
          BENCH_FAIL_ON_REGRESSION: "1"
        run: just bench-report-check

      - name: Publish benchmark summary
        if: always()
        run: |
          if [[ -f coverage/benchmarks/summary.md ]]; then
            cat coverage/benchmarks/summary.md >> "$GITHUB_STEP_SUMMARY"
          else
            echo "No benchmark summary generated." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Save benchmark baseline
        if: github.ref == 'refs/heads/main'
        uses: actions/cache/save@v5
        with:
          path: crates/ndarrow/target/criterion
          key: ${{ runner.os }}-bench-baseline-${{ github.ref_name }}-${{ github.sha }}

  # ── Summary ──
  ci-success:
    name: ci-success
    if: always()
    needs: [changes, check, test-unit, test-integration, coverage, benchmark-smoke]
    runs-on: ubuntu-latest
    steps:
      - name: Evaluate CI result
        run: |
          if [[ "${{ needs.changes.outputs.code }}" != "true" ]]; then
            echo "Documentation-only change. CI gates skipped."
            exit 0
          fi

          RESULTS=(
            "${{ needs.check.result }}"
            "${{ needs.test-unit.result }}"
            "${{ needs.test-integration.result }}"
            "${{ needs.coverage.result }}"
            "${{ needs.benchmark-smoke.result }}"
          )

          for result in "${RESULTS[@]}"; do
            if [[ "$result" != "success" && "$result" != "skipped" ]]; then
              echo "CI failed: at least one job did not succeed ($result)"
              exit 1
            fi
          done

          echo "All CI gates passed."
