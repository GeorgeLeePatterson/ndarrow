name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 0.1.0). Optional; defaults to Cargo.toml workspace version.'
        required: false
        type: string
      skip_publish:
        description: 'Skip crates.io publish (release notes only)'
        default: false
        required: false
        type: boolean
      dry_run:
        description: 'Dry-run publish (verify without uploading)'
        default: false
        required: false
        type: boolean

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  RUSTFLAGS: '-C debuginfo=line-tables-only -C incremental=false'

jobs:
  release:
    name: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            if [ -n "${{ inputs.version }}" ]; then
              VERSION="${{ inputs.version }}"
            else
              VERSION=$(awk '/^\[workspace\.package\]/ {in_workspace_package=1; next} in_workspace_package && /^version = / {gsub(/"/,"",$3); print $3; exit}' Cargo.toml)
            fi
          else
            VERSION="${GITHUB_REF#refs/tags/v}"
          fi

          if ! [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z]+)?$ ]]; then
            echo "Invalid release version: '$VERSION'"
            exit 1
          fi

          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "VERSION=${VERSION}" >> "$GITHUB_ENV"
          echo "Releasing version: ${VERSION}"

      - name: Verify Cargo.toml workspace version
        run: |
          CARGO_VERSION=$(awk '/^\[workspace\.package\]/ {in_workspace_package=1; next} in_workspace_package && /^version = / {gsub(/"/,"",$3); print $3; exit}' Cargo.toml)
          if [ -z "$CARGO_VERSION" ]; then
            echo "Error: could not read [workspace.package] version from Cargo.toml"
            exit 1
          fi

          if [ "$CARGO_VERSION" != "${{ steps.version.outputs.version }}" ]; then
            echo "Error: workspace version ($CARGO_VERSION) does not match requested version (${{ steps.version.outputs.version }})"
            exit 1
          fi

      - name: Dry-run publish
        if: ${{ inputs.dry_run == true }}
        run: cargo publish --dry-run -p ndarrow --no-verify

      - name: Publish ndarrow to crates.io
        if: ${{ inputs.skip_publish != true && inputs.dry_run != true }}
        run: cargo publish -p ndarrow --no-verify --token ${{ secrets.CARGO_REGISTRY_TOKEN }}
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Prepare release notes
        run: |
          if [ -f "RELEASE_NOTES.md" ]; then
            cp RELEASE_NOTES.md release_notes_for_tag.md
          else
            printf "# Release v%s\n\nRelease v%s.\n" "${{ env.VERSION }}" "${{ env.VERSION }}" > release_notes_for_tag.md
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release_notes_for_tag.md
          draft: false
          prerelease: ${{ contains(env.VERSION, '-rc') || contains(env.VERSION, '-beta') || contains(env.VERSION, '-alpha') }}
          tag_name: v${{ env.VERSION }}
          name: Release v${{ env.VERSION }}
